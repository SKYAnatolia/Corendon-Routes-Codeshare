<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Corendon Virtual - AJet Virtual - Etihad Virtual Route Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a2a32; }
        .map-container { width: 100vw; height: 100vh; position: relative; }
        #routeMap { width: 100%; height: 100%; background-color: #c8e0f0; z-index: 1; }
        
        .custom-map-control {
            background: rgba(15, 26, 31, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 1000;
            flex-wrap: wrap;
        }
        .legend { display: flex; gap: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 500; color: #f0f0f0; }
        .corendon-badge { width: 20px; height: 20px; background-color: #ff8c00; border-radius: 50%; }
        .ajet-badge { width: 20px; height: 20px; background-color: #003399; border-radius: 50%; }
        .etihad-badge { width: 20px; height: 20px; background-color: #2C5F2D; border-radius: 50%; }
        .footer {
            position: absolute;
            bottom: 10px;
            right: 15px;
            background: rgba(0,0,0,0.6);
            color: #ccc;
            font-size: 10px;
            padding: 4px 10px;
            border-radius: 20px;
            z-index: 1000;
            pointer-events: none;
        }
        
        .leaflet-marker-icon {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            outline: none !important;
        }
        
        @media (max-width: 700px) {
            .custom-map-control { padding: 6px 15px; gap: 12px; top: 10px; right: 10px; }
            .legend-item span { font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="map-container">
    <div id="routeMap"></div>
    <div class="custom-map-control">
        <div class="legend">
            <div class="legend-item"><div class="corendon-badge"></div><span>Corendon Virtual</span></div>
            <div class="legend-item"><div class="ajet-badge"></div><span>AJet Virtual</span></div>
            <div class="legend-item"><div class="etihad-badge"></div><span>Etihad Virtual</span></div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // HAVALİMANI KOORDİNATLARI
    // ============================================================
    const airportCoords = {
        // Corendon (Türkiye + Avrupa)
        "LTAI": [36.9003, 30.7935], "LTBJ": [38.2924, 27.1570], "LTFG": [36.5455, 32.3011],
        "LTAC": [40.1281, 32.9951], "LTFE": [37.2509, 27.6643], "LTAF": [36.9821, 35.2804],
        "LTFH": [41.2742, 36.3037], "LTAS": [41.5063, 32.0886], "LTBF": [39.6193, 27.9260],
        "LTCC": [37.8938, 40.2010], "LTBI": [39.7841, 30.5824], "LTAJ": [36.9472, 37.4787],

        "BKPR": [42.5728, 21.0358], "LYBE": [44.8184, 20.3091], "LATI": [41.4147, 19.7206],

        "OEJN": [21.6796, 39.1565],  // Jeddah

        "OTHH": [25.2731, 51.6081],  // Doha
        "OBBI": [26.2708, 50.6336],  // Bahrain

    // ============================================================

    // ============================================================
    const corendonAirports = new Set();
    const ajetAirports = new Set();
    const etihadAirports = new Set();
    
    // 1. CORENDON (Türkiye ↔ Avrupa)
    const corendonRoutePairs = [
        ["LTAI","EDDB"],["EDDB","LTAI"],["LTAI","EDDW"],["EDDW","LTAI"],["LTAI","EDDC"],["EDDC","LTAI"],
        ["LTAI","EDLL"],["EDLL","LTAI"],["LTAI","EDDE"],["EDDE","LTAI"],["LTAI","EDDF"],["EDDF","LTAI"],
        ["LTAI","EDNY"],["EDNY","LTAI"],["LTAI","EDDH"],["EDDH","LTAI"],["LTAI","EDDV"],["EDDV","LTAI"],
        ["LTAI","EDSB"],["EDBS","LTAI"],["LTAI","EDVK"],["EDVK","LTAI"],["LTAI","EDDK"],["EDDK","LTAI"],
        ["LTAI","EDDP"],["EDDP","LTAI"],["LTAI","EDDM"],["EDDM","LTAI"],["LTAI","EDDG"],["EDDG","LTAI"],
        ["LTAI","EDNN"],["EDNN","LTAI"],["LTAI","EDLP"],["EDLP","LTAI"],["LTAI","ETNL"],["ETNL","LTAI"],
        ["LTAI","EDDR"],["EDDR","LTAI"],["LTAI","EDDS"],["EDDS","LTAI"],["LTAI","LOWG"],["LOWG","LTAI"],
        ["LTAI","LOWL"],["LOWL","LTAI"],["LTAI","LOWS"],["LOWS","LTAI"],["LTAI","LOWW"],["LOWW","LTAI"],
        ["LTAI","EBRR"],["EBRR","LTAI"],["LTAI","EGBB"],["EGBB","LTAI"],["LTAI","EGGD"],["EGGD","LTAI"],
        ["LTAI","EGPF"],["EGPF","LTAI"],["LTAI","EGKK"],["EGKK","LTAI"],["LTAI","EGSS"],["EGSS","LTAI"],
        ["LTAI","EGCC"],["EGCC","LTAI"],["LTAI","EGNT"],["EGNT","LTAI"],["LTAI","EHAM"],["EHAM","LTAI"],
        ["LTAI","LHBP"],["LHBP","LTAI"],["LTAI","EPGD"],["EPGD","LTAI"],["LTAI","EPKT"],["EPKT","LTAI"],
        ["LTAI","EPPO"],["EPPO","LTAI"],["LTAI","EPWA"],["EPWA","LTAI"],["LTAI","EPWR"],["EPWR","LTAI"],
        ["LTAI","LROP"],["LROP","LTAI"],["LTAI","LZIP"],["LZIP","LTAI"],["LTAI","LJLJ"],["LJLJ","LTAI"],
        ["LTAI","LFSB"],["LFSB","LTAI"],["LTAI","LSZH"],["LSZH","LTAI"],["LTBJ","EDDB"],["EDDB","LTBJ"],
        ["LTBJ","EDLL"],["EDLL","LTBJ"],["LTBJ","EDHH"],["EDHH","LTBJ"],["LTBJ","EDDV"],["EDDV","LTBJ"],
        ["LTBJ","EDDK"],["EDDK","LTBJ"],["LTBJ","EDDM"],["EDDM","LTBJ"],["LTBJ","EDNN"],["EDNN","LTBJ"],
        ["LTBJ","EDDS"],["EDSS","LTBJ"],["LTBJ","LOWW"],["LOWW","LTBJ"],["LTBJ","EBBR"],["EBBR","LTBJ"],
        ["LTBJ","EGSS"],["EGSS","LTBJ"],["LTBJ","EGCC"],["EGCC","LTBJ"],["LTBJ","EHAM"],["EHAM","LTBJ"],
        ["LTBJ","EHRD"],["EHRD","LTBJ"],["LTFG","EDDB"],["EDDB","LTFG"],["LTFG","EDDL"],["EDDL","LTFG"],
        ["LTFG","EDDK"],["EDDK","LTFG"],["LTFG","EDDP"],["EDDP","LTFG"],["LTFG","EDDM"],["EDDM","LTFG"],
        ["LTFG","EDDN"],["EDDN","LTFG"],["LTFG","EDDS"],["EDSS","LTFG"],["LTFG","EPWA"],["EPWA","LTFG"],
        ["LTFG","LROP"],["LROP","LTFG"],["LTFG","LRCL"],["LRCL","LTFG"],["LTAC","EDDL"],["EDDL","LTAC"],
        ["LTAC","EDDK"],["EDDK","LTAC"],["LTAC","EDDN"],["EDNN","LTAC"],["LTFE","EDDV"],["EDDV","LTFE"],
        ["LTFE","EDDK"],["EDDK","LTFE"],["LTFE","EBBR"],["EBBR","LTFE"],["LTAF","EDDL"],["EDDL","LTAF"],
        ["LTAF","EDDK"],["EDDK","LTAF"],["LTAF","EDDN"],["EDDN","LTAF"],["LTFH","EDDL"],["EDLL","LTFH"],
        ["LTFH","EDDV"],["EDDV","LTFH"],["LTAS","EDDL"],["EDDL","LTAS"],["LTAS","EDDK"],["EDDK","LTAS"],
        ["LTBF","EDDK"],["EDDK","LTBF"],["LTCC","EDDV"],["EDDV","LTCC"],["LTBI","EBBR"],["EBBR","LTBI"],
        ["LTAJ","EDDV"],["EDDV","LTAJ"],["LTAU","EDDL"],["EDDL","LTAU"],["LTAU","EDDV"],["EDDV","LTAU"],
        ["LTAU","EDDK"],["EDDK","LTAU"],["LTAU","EDDN"],["EDDN","LTAU"],["LTAU","EHRD"],["EHRD","LTAU"],
        ["LTBS","EDDL"],["EDDL","LTBS"],["LTBS","EDDK"],["EDDK","LTBS"],["LTBS","EDDN"],["EDDN","LTBS"],
        ["LTBS","EGBB"],["EGBB","LTBS"],["LTBS","EGKK"],["EGKK","LTBS"],["LTBS","EGCC"],["EGCC","LTBS"],
        ["LTBS","EGNT"],["EGNT","LTBS"],["LTAI","LTFM"],["LTFM","LTAI"],["LTAI","LTAC"],["LTAC","LTAI"],
        ["LTAI","LTBJ"],["LTBJ","LTAI"],["LTAI","LTFH"],["LTFH","LTAI"],["LTAI","LTAJ"],["LTAJ","LTAI"],
        ["LTAI","LTCC"],["LTCC","LTAI"],["LTAI","LTAF"],["LTAF","LTAI"],["LTAI","LTAU"],["LTAU","LTAI"],
        ["LTBJ","LTFM"],["LTFM","LTBJ"],["LTBJ","LTAC"],["LTAC","LTBJ"],["LTBJ","LTFH"],["LTFH","LTBJ"],
        ["LTBJ","LTAJ"],["LTAJ","LTBJ"],["LTBJ","LTCC"],["LTCC","LTBJ"],["LTFE","LTFM"],["LTFM","LTFE"],
        ["LTFE","LTAC"],["LTAC","LTFE"],["LTBS","LTFM"],["LTFM","LTBS"],["LTBS","LTAC"],["LTAC","LTBS"],
        ["LTAC","LTCC"],["LTCC","LTAC"],["LTAC","LTAJ"],["LTAJ","LTAC"],["LTFM","LTCC"],["LTCC","LTFM"],
        ["LTFM","LTAJ"],["LTAJ","LTFM"]
    ];
    
    corendonRoutePairs.forEach(pair => { corendonAirports.add(pair[0]); corendonAirports.add(pair[1]); });
    
    // 2. AJET (SADECE verdiğin AJet listesi - Rusya/İskandinavya/Balkanlar)
    const ajetRoutePairs = [
        ["LTFJ","ULLI"],["ULLI","LTFJ"],["LTFJ","ESSA"],["ESSA","LTFJ"],["LTAC","EKCH"],["EKCH","LTAC"],
        ["LTAC","LFPG"],["LFPG","LTAC"],["LTAC","LSGG"],["LSGG","LTAC"],["LTFJ","DAAG"],["DAAG","LTFJ"],
        ["LTFJ","LIRF"],["LIRF","LTFJ"],["LTFJ","LKPR"],["LKPR","LTFJ"],["LTFJ","LQSA"],["LQSA","LTFJ"],
        ["LTFJ","BKPR"],["BKPR","LTFJ"],["LTAC","LYBE"],["LYBE","LTAC"],["LTAC","LATI"],["LATI","LTAC"],
        ["LTFJ","LTBJ"],["LTBJ","LTFJ"],["LTFJ","LTAI"],["LTAI","LTFJ"],["LTAC","LTFJ"],["LTFJ","LTAC"],
        ["LTAC","LTFE"],["LTFE","LTAC"],["LTFE","EDDV"],["EDDV","LTFE"],["LTFJ","LTAJ"],["LTAJ","LTFJ"],
        ["LTFJ","LTFO"],["LTFO","LTFJ"]
    ];
    
    ajetRoutePairs.forEach(pair => { ajetAirports.add(pair[0]); ajetAirports.add(pair[1]); });
    
    // 3. ETIHAD (SADECE verdiğin Etihad listesi - Orta Doğu + Antalya)
    const etihadRoutePairs = [
        ["LTAI","OMAA"],["OMAA","LTAI"],
        ["OMAA","OEJN"],["OEJN","OMAA"],
        ["OMAA","OEMA"],["OEMA","OMAA"],
        ["OMAA","OTHH"],["OTHH","OMAA"],
        ["OMAA","OBBI"],["OBBI","OMAA"],
        ["OMAA","OOMS"],["OOMS","OMAA"],
        ["OMAA","OERK"],["OERK","OMAA"],
        ["OMAA","OEDF"],["OEDF","OMAA"],
        ["OMAA","OKKK"],["OKKK","OMAA"],
        ["OMAA","HECA"],["HECA","OMAA"]
    ];
    
    etihadRoutePairs.forEach(pair => { etihadAirports.add(pair[0]); etihadAirports.add(pair[1]); });

    // ============================================================
    // HARİTA ve MARKER'LAR
    // ============================================================
    const map = L.map('routeMap').setView([40.0, 30.0], 4);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>',
        subdomains: 'abcd', maxZoom: 19, minZoom: 3
    }).addTo(map);

    // ICONLAR
    const corendonIcon = L.divIcon({
        html: '<div style="background:#ff8c00; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color:white;">C</div>',
        iconSize: [30, 30], popupAnchor: [0, -15], className: ''
    });
    
    const ajetIcon = L.divIcon({
        html: '<div style="background:#003399; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color:white;">A</div>',
        iconSize: [30, 30], popupAnchor: [0, -15], className: ''
    });
    
    const etihadIcon = L.divIcon({
        html: '<div style="background:#2C5F2D; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:bold; color:white;">E</div>',
        iconSize: [30, 30], popupAnchor: [0, -15], className: ''
    });
    
    const corendonAjetIcon = L.divIcon({
        html: '<div style="background: linear-gradient(135deg, #ff8c00 0%, #ff8c00 50%, #003399 50%, #003399 100%); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white;">C+A</div>',
        iconSize: [32, 32], popupAnchor: [0, -16], className: ''
    });
    
    const corendonEtihadIcon = L.divIcon({
        html: '<div style="background: linear-gradient(135deg, #ff8c00 0%, #ff8c00 50%, #2C5F2D 50%, #2C5F2D 100%); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white;">C+E</div>',
        iconSize: [32, 32], popupAnchor: [0, -16], className: ''
    });
    
    const ajetEtihadIcon = L.divIcon({
        html: '<div style="background: linear-gradient(135deg, #003399 0%, #003399 50%, #2C5F2D 50%, #2C5F2D 100%); width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:bold; color:white;">A+E</div>',
        iconSize: [32, 32], popupAnchor: [0, -16], className: ''
    });
    
    const allThreeIcon = L.divIcon({
        html: '<div style="background: linear-gradient(135deg, #ff8c00 0%, #ff8c00 33%, #003399 33%, #003399 66%, #2C5F2D 66%, #2C5F2D 100%); width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:bold; color:white;">C+A+E</div>',
        iconSize: [36, 36], popupAnchor: [0, -18], className: ''
    });

    function getCityName(icao) {
        const cityMap = {
            "LTAI":"Antalya","EDDB":"Berlin","LTBJ":"Izmir","LTFG":"Alanya","LTAC":"Ankara","LTFE":"Bodrum",
            "LTAF":"Adana","LTFH":"Samsun","LTAS":"Zonguldak","LTBF":"Balikesir","LTCC":"Diyarbakir",
            "LTBI":"Eskisehir","LTAJ":"Gaziantep","LTAU":"Kayseri","LTBS":"Dalaman","LTFM":"Istanbul",
            "LTFJ":"Sabiha Gökçen","LTFO":"Rize",
            "OMAA":"Abu Dhabi","OEJN":"Jeddah","OEMA":"Riyadh","OTHH":"Doha","OBBI":"Bahrain",
            "OOMS":"Muscat","OERK":"Riyadh","OEDF":"Dammam","OKKK":"Kuwait","HECA":"Cairo",
            "ULLI":"St Petersburg","ESSA":"Stockholm","EKCH":"Copenhagen","LFPG":"Paris","LSGG":"Geneva",
            "DAAG":"Algiers","LIRF":"Rome","LKPR":"Prague","LQSA":"Sarajevo","BKPR":"Pristina",
            "LYBE":"Belgrade","LATI":"Tirana","RZV":"Rize",
            "EDDW":"Bremen","EDDC":"Dresden","EDLL":"Düsseldorf","EDDE":"Erfurt","EDDF":"Frankfurt",
            "EDNY":"Friedrichshafen","EDDH":"Hamburg","EDDV":"Hannover","EDSB":"Karlsruhe","EDVK":"Kassel",
            "EDDK":"Cologne","EDDP":"Leipzig","EDDM":"Munich","EDDG":"Osnabrück","EDNN":"Nuremberg",
            "EDLP":"Paderborn","ETNL":"Rostock","EDDR":"Saarbrücken","EDDS":"Stuttgart","LOWG":"Graz",
            "LOWL":"Linz","LOWS":"Salzburg","LOWW":"Vienna","EBRR":"Rumbeke","EGBB":"Birmingham",
            "EGGD":"Bristol","EGPF":"Glasgow","EGKK":"London Gatwick","EGSS":"London Stansted",
            "EGCC":"Manchester","EGNT":"Newcastle","EHAM":"Amsterdam","LHBP":"Budapest","EPGD":"Gdańsk",
            "EPKT":"Katowice","EPPO":"Poznań","EPWA":"Warsaw","EPWR":"Wrocław","LROP":"Bucharest",
            "LZIP":"Bratislava","LJLJ":"Ljubljana","LFSB":"EuroAirport","LSZH":"Zurich","EBBR":"Brussels",
            "EHRD":"Rotterdam"
        };
        return cityMap[icao] || icao;
    }
    
    const allAirports = new Set([...corendonAirports, ...ajetAirports, ...etihadAirports]);
    
    allAirports.forEach(icao => {
        const coords = airportCoords[icao];
        if(!coords) return;
        
        const hasCorendon = corendonAirports.has(icao);
        const hasAjet = ajetAirports.has(icao);
        const hasEtihad = etihadAirports.has(icao);
        
        let icon;
        const count = [hasCorendon, hasAjet, hasEtihad].filter(Boolean).length;
        
        if (count === 3) icon = allThreeIcon;
        else if (hasCorendon && hasAjet && !hasEtihad) icon = corendonAjetIcon;
        else if (hasCorendon && hasEtihad && !hasAjet) icon = corendonEtihadIcon;
        else if (hasAjet && hasEtihad && !hasCorendon) icon = ajetEtihadIcon;
        else if (hasCorendon) icon = corendonIcon;
        else if (hasAjet) icon = ajetIcon;
        else icon = etihadIcon;
        
        L.marker(coords, { icon: icon }).addTo(map).bindPopup(`<strong>${icao}</strong><br>${getCityName(icao)}`);
    });
    
    setTimeout(() => map.invalidateSize(), 200);
    console.log("Corendon:", corendonAirports.size, "AJet:", ajetAirports.size, "Etihad:", etihadAirports.size);
</script>
</body>
</html>
